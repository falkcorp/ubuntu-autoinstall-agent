# Minimal Ubuntu 26.04 image specification
ubuntu_version: "26.04"
architecture: amd64

base_packages:
  - openssh-server
  - curl
  - wget
  - htop
  - vim
  - git

vm_config:
  memory_mb: 2048
  disk_size_gb: 20
  cpu_cores: 2

custom_scripts: []
