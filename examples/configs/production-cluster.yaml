hostname: prod-node-001
disk_device: /dev/nvme0n1
timezone: UTC

luks_key: "change-me"
root_password: "change-me"

network_interface: enp1s0f0
network_address: "10.1.1.100/24"
network_gateway: "10.1.1.1"
network_search: cluster.internal
network_nameservers:
  - "10.1.1.1"
  - "1.1.1.1"
  - "8.8.8.8"

debootstrap_release: resolute
debootstrap_mirror: "http://archive.ubuntu.com/ubuntu/"

initramfs_type: dracut

tang_servers:
  - url: "http://tang1.cluster.internal"
  - url: "http://tang2.cluster.internal"
  - url: "http://tang3.cluster.internal"
tang_threshold: 2

ssh_authorized_keys:
  - "ssh-ed25519 AAAA... admin@management"
