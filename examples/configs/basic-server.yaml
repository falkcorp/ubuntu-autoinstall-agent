hostname: basic-server-001
disk_device: /dev/nvme0n1
timezone: America/New_York

luks_key: "change-me"
root_password: "change-me"

network_interface: enp1s0f0
network_address: "192.168.1.10/24"
network_gateway: "192.168.1.1"
network_search: local
network_nameservers:
  - "192.168.1.1"
  - "1.1.1.1"
  - "8.8.8.8"

debootstrap_release: resolute
debootstrap_mirror: "http://archive.ubuntu.com/ubuntu/"

initramfs_type: dracut

tang_servers: []
tang_threshold: 2

ssh_authorized_keys:
  - "ssh-ed25519 AAAA... your-key-here"
