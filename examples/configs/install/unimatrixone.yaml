#
# NativeKeystore (ZFS native-encryption) install TEMPLATE — the future standard
# "server profile". This is a SANITIZED schema example: every host-unique
# identifier (disk by-id serials, IP/MAC, hostname) is a REPLACE_AT_PLACE_TIME
# placeholder. The REAL per-host values live in the registry backend (server
# side, /var/lib/uaa) and are injected by `uaa config place` — they are NOT
# committed to git (no fleet topology / MAC exposure). See
# docs/specs/u1-zfs-native-encryption-{design,plan}.md.
#
# Deserializes into `InstallationConfig` (crates/uaa-core/.../config.rs).
#
# Topology (4 drives, all by-id — never sdX/nvmeXnY):
#   - 2× Optane (system): ESP + bpool member + special-vdev member
#   - 2× SSD    (data):    whole-disk rpool data mirror

hostname: unimatrixone
timezone: America/New_York

storage_mode: native-keystore
# Role-tagged disk roster, by-id. `system` = Optane (ESP+bpool+special);
# `data` = SSD (whole-disk rpool mirror). Real serials injected at place-time.
disks:
  - id: REPLACE_AT_PLACE_TIME_SYSTEM_0
    role: system
  - id: REPLACE_AT_PLACE_TIME_SYSTEM_1
    role: system
  - id: REPLACE_AT_PLACE_TIME_DATA_0
    role: data
  - id: REPLACE_AT_PLACE_TIME_DATA_1
    role: data

# Required by the schema but IGNORED under native-keystore (the `disks` roster
# drives partitioning). Placeholder — injected at place-time.
disk_device: REPLACE_AT_PLACE_TIME

# --- secrets + host-unique values: injected per-host at place-time ---
# For native-keystore, luks_key is the keystore-LUKS recovery passphrase
# (break-glass at IPMI SOL); clevis Tang+TPM2 does the unattended unlock.
luks_key: REPLACE_AT_PLACE_TIME
root_password: REPLACE_AT_PLACE_TIME
install_ca_cert: REPLACE_AT_PLACE_TIME

network_interface: REPLACE_AT_PLACE_TIME
network_address: REPLACE_AT_PLACE_TIME
network_gateway: REPLACE_AT_PLACE_TIME
network_search: jf.local
network_nameservers:
  - 172.16.2.1
  - 1.1.1.1
  - 8.8.8.8

debootstrap_release: resolute
debootstrap_mirror: http://archive.ubuntu.com/ubuntu/
initramfs_type: dracut

# Unlock policy D2-B — clevis SSS t=2 over {3 Tang (thumbprint-pinned) + 1 TPM2
# peer (PCR7, sha256 bank)}, bound to the keystore-zvol LUKS. Any 2 of the 4
# shares unlock: survives 2 Tang down (TPM + 1 Tang), stays locked off-LAN (TPM
# alone < 2). The TPM2 peer is a clevis *pin* (added automatically under
# native-keystore), NOT the systemd-tpm2 token path — see enroll_tpm2 below.
tang_servers:
  - url: http://172.16.2.45
  - url: http://172.16.2.46
  - url: http://172.16.2.47
tang_threshold: 2

ssh_authorized_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOq0x6/0fA+vn0EdNJvBuadOo4rZ1IwkCWbBOWCwvId5 jdfalk@Norn.lan"

# D2-B decision 5: NO systemd-tpm2 / systemd-fido2 tokens — they hang the boot
# (R4) and can never be unattended. The TPM2 factor is the clevis tpm2 PIN
# (added by the native-keystore clevis bind), a different mechanism. So:
enroll_tpm2: false
tpm2_pcr_ids: "7"
expect_fido2: false
