# Builds the constellation control-plane SPA (web/) on every change under
# web/**. This is the SPA's own build gate — it does not touch Rust and does
# not run on non-web changes. CT-07 (rust-embed hookup, several waves later)
# depends on `web/dist/.gitkeep` existing so its `#[folder = "web/dist"]`
# compiles even before this workflow has produced a real build; this
# workflow's `spa-dist` artifact is the CI-built dist that will eventually be
# consumed downstream.

name: SPA Build

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-spa:
    name: Build web/ (npm ci && npm run build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload artifact (spa-dist)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spa-dist
          path: web/dist
          if-no-files-found: error
