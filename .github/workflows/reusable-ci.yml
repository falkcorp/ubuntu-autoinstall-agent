# file: .github/workflows/reusable-ci.yml
# version: 1.1.0
# guid: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d

name: Reusable CI Workflow

on:
  workflow_call:
    inputs:
      base_ref:
        description: "Base git reference for change detection"
        type: string
        required: false
        default: "origin/main"
      optimize_matrix:
        description: "Optimize test matrix to reduce job count"
        type: boolean
        required: false
        default: true
      coverage_threshold:
        description: "Minimum coverage percentage (overrides config)"
        type: number
        required: false
        default: 0
    outputs:
      matrix:
        description: "Generated test matrix JSON"
        value: ${{ jobs.generate-matrix.outputs.matrix }}
      has_tests:
        description: "True if tests should run"
        value: ${{ jobs.generate-matrix.outputs.has_tests }}

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-matrix:
    name: Generate Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      has_tests: ${{ steps.generate.outputs.has_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Generate test matrix
        id: generate
        run: |
          python3 .github/workflows/scripts/ci_workflow.py \
            --base-ref "${{ inputs.base_ref }}" \
            ${{ inputs.optimize_matrix && '--optimize' || '' }} \
            --output-matrix

  run-tests:
    name: Test ${{ matrix.language }} ${{ matrix.version }} on ${{ matrix.os }}
    needs: generate-matrix
    if: needs.generate-matrix.outputs.has_tests == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.version }}

      - name: Run Go tests
        if: matrix.language == 'go'
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.version }}

      - name: Run Python tests
        if: matrix.language == 'python'
        run: |
          # pyyaml/requests: this repo's actual Python (the .github/workflows
          # /scripts/ CI helpers + their tests) imports both transitively;
          # without them collection fails before any test runs.
          pip install pytest pytest-cov pyyaml requests
          pytest --cov --cov-report=term-missing

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: ${{ matrix.version }}

      - name: Install cargo-tarpaulin
        if: matrix.language == 'rust'
        run: |
          if ! command -v cargo-tarpaulin >/dev/null 2>&1; then
            cargo install cargo-tarpaulin --locked
          fi

      - name: Run Rust tests
        if: matrix.language == 'rust'
        run: |
          cargo test --all-features
          cargo tarpaulin --out Lcov

      - name: Set up Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}

      - name: Detect Node project directory
        if: matrix.language == 'node'
        id: node-project
        run: |
          # This repo's Node/TS project lives under web/, not the repo root
          # (a Rust workspace) — fall back to root only if it has its own
          # package.json, so this step still works for a Node-primary repo.
          if [ -f web/package.json ]; then
            echo "dir=web" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Run Node.js tests
        if: matrix.language == 'node'
        working-directory: ${{ steps.node-project.outputs.dir }}
        run: |
          npm ci
          # --if-present: this repo has no JS test suite yet (web/package.json
          # defines no "test" script) — a missing script must not fail CI;
          # it will start running the moment a real test script is added.
          npm run --if-present test -- --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.out
          flags: ${{ matrix.language }}-${{ matrix.version }}-${{ matrix.os }}
