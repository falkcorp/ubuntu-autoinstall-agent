# file: .github/repository-config.yml
# version: 1.1.0
# guid: d2f4a5b6-c7d8-49e0-a1b2-3456c7890def

languages:
  versions:
    # No `go` entry: this repo has zero Go source (Rust workspace + a web/
    # TypeScript SPA). The generic CI matrix previously still ran `go test
    # ./...` for it anyway (nothing else in this file told it not to),
    # which always failed since there's no go.mod anywhere to find.
    python:
      - "3.13"
      - "3.14"
    node:
      - "20"
      - "22"
    rust:
      - "stable"
      - "stable-1"

build:
  platforms:
    - ubuntu-latest
    - macos-latest

testing:
  coverage:
    rust:
      threshold: 80
      format: lcov
    python:
      threshold: 80
      format: cobertura

workflows:
  experimental:
    use_new_ci: true
    use_new_release: true
    use_config_matrices: true
packages:
  registries:
    github: true
    pypi: false
    npm: false
    cargo: false
