# Dependabot Configuration

version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: deps
      include: scope

updates:
  # Cargo
  - package-ecosystem: cargo
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - tech:rust
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # reqwest is pre-1.0, so a 0.12->0.13 bump is classified as
      # "semver-minor" by the rule above and slips through — but 0.13
      # renamed the rustls-tls feature (breaks our build) and changed the
      # default TLS root-cert verifier, which touches the fail-closed,
      # pinned-CA-only client in crates/uaa-core/src/pki.rs
      # (ReqwestEnrollTransport). Needs a deliberate, tested migration, not
      # an unattended bump (see PR #93).
      - dependency-name: "reqwest"
        versions: [">=0.13.0"]

  # Github Actions
  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - github-actions
      - ci-cd

