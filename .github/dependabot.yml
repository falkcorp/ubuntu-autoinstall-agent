# Dependabot Configuration

version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: weekly
      day: tuesday
      time: "10:00"
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: deps
      include: scope

updates:
  # Cargo
  - package-ecosystem: cargo
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - tech:rust
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # Almost every Cargo dependency here is pre-1.0 (reqwest, rcgen,
      # axum, tonic, sha2, mdns-sd, ed25519-dalek, ...), where Dependabot
      # classifies a 0.x -> 0.(x+1) bump as "semver-minor" — the rule above
      # (major-only) never catches it, yet these bumps break the build as
      # often as a real major would. Proven twice: reqwest 0.12->0.13 (PR
      # #93, renamed the rustls-tls feature + changed the default TLS
      # root-cert verifier, touching the fail-closed pinned-CA client in
      # pki.rs) and a 16-crate grouped bump (PR #94: rcgen's Ia5String went
      # private, sha2 0.11's LowerHex bound broke, mdns-sd 0.20 reworked its
      # API, tonic-build 0.14 removed `configure()`). Ignoring semver-minor
      # too means routine dependency bumps here are patch-only; upgrading a
      # 0.x crate to a new "minor" is a deliberate, tested, one-at-a-time
      # decision, not something to wave through weekly. (Security-advisory
      # PRs are a separate Dependabot mechanism and are NOT filtered by
      # this — see the vite fix that still needed doing by hand because it
      # crossed the same kind of pre-1.0 boundary.)
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor

  # Github Actions
  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: dependencies
    labels:
      - github-actions
      - ci-cd

